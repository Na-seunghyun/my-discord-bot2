<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kingshot Feedback</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a12;
      --panel: rgba(16, 22, 38, .82);
      --line: rgba(154, 183, 255, .22);
      --text: #f7fbff;
      --muted: #aab8d5;
      --cyan: #43f6d7;
      --gold: #f6cf72;
      --warn: #ff9f7a;
      font-family: Inter, Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(115deg, rgba(67,246,215,.14), transparent 34%),
        radial-gradient(circle at 80% 10%, rgba(246,207,114,.18), transparent 32%),
        #070a12;
    }
    .wrap { width: min(1060px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 38px; }
    header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(7,10,18,.62);
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
    }
    h1, h2, p { margin: 0; }
    h1 { margin-top: 10px; font-size: clamp(32px, 6vw, 60px); line-height: 1; }
    h2 { font-size: 20px; }
    .chip {
      display: inline-flex;
      padding: 8px 11px;
      border: 1px solid rgba(67,246,215,.36);
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(67,246,215,.09);
      font-size: 12px;
      font-weight: 950;
    }
    .sub { margin-top: 10px; color: var(--muted); line-height: 1.65; }
    .actions { display: flex; gap: 9px; flex-wrap: wrap; justify-content: flex-end; }
    a, button, select, input, textarea {
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.07);
      color: var(--text);
      font: inherit;
    }
    a, button, select { min-height: 42px; padding: 0 13px; font-size: 13px; font-weight: 900; }
    a { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
    select option { background: #12192b; color: var(--text); }
    .layout { display: grid; grid-template-columns: minmax(0, 1.12fr) minmax(300px, .88fr); gap: 16px; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.028)), var(--panel);
      box-shadow: 0 24px 80px rgba(0,0,0,.38);
      padding: 18px;
    }
    form, .admin { display: grid; gap: 13px; margin-top: 14px; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; font-weight: 850; }
    input, textarea, select { width: 100%; padding: 11px 12px; outline: none; }
    textarea { min-height: 170px; resize: vertical; line-height: 1.5; }
    input:focus, textarea:focus, select:focus { border-color: rgba(67,246,215,.78); box-shadow: 0 0 0 3px rgba(67,246,215,.12); }
    .submit { border: 0; background: linear-gradient(135deg, var(--cyan), var(--gold)); color: #09101c; cursor: pointer; }
    .submit:disabled { opacity: .62; cursor: wait; }
    .status { min-height: 24px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .ok { color: #70f1d3; }
    .bad { color: var(--warn); }
    .admin-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
    .list { display: grid; gap: 10px; max-height: 520px; overflow: auto; }
    .item { border: 1px solid rgba(154,183,255,.18); border-radius: 14px; background: rgba(255,255,255,.045); padding: 12px; display: grid; gap: 8px; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; color: var(--muted); font-size: 12px; }
    .pill { border: 1px solid rgba(154,183,255,.18); border-radius: 999px; padding: 4px 7px; background: rgba(255,255,255,.05); }
    .message { white-space: pre-wrap; line-height: 1.45; font-size: 13px; }
    @media (max-width: 820px) {
      .wrap { width: min(100% - 22px, 1060px); padding-top: 14px; }
      header, .layout { display: grid; grid-template-columns: 1fr; }
      .actions { display: grid; grid-template-columns: 1fr; }
      .admin-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <div class="chip">885 LEGEND NASHSH</div>
        <h1 data-i18n="title">Updates / Bug Reports</h1>
        <p class="sub" data-i18n="subtitle">Share feature ideas, calculation bugs, translation issues, or mobile usability problems.</p>
      </div>
      <div class="actions">
        <select id="langSelect" aria-label="Language">
          <option value="ko">Korean</option>
          <option value="en">English</option>
          <option value="zh-CN">Chinese</option>
          <option value="zh-TW">Taiwanese</option>
          <option value="fr">Francais</option>
          <option value="de">Deutsch</option>
          <option value="th">Thai</option>
          <option value="id">Indonesia</option>
        </select>
        <a id="backLink" href="./index.html" data-i18n="back">Back to hub</a>
      </div>
    </header>

    <section class="layout">
      <div class="panel">
        <h2 data-i18n="formTitle">Send feedback</h2>
        <form id="feedbackForm">
          <label><span data-i18n="typeLabel">Type</span>
            <select id="type">
              <option value="bug" data-i18n="typeBug">Bug report</option>
              <option value="update" data-i18n="typeUpdate">Feature request</option>
              <option value="translation" data-i18n="typeTranslation">Translation issue</option>
              <option value="other" data-i18n="typeOther">Other</option>
            </select>
          </label>
          <label><span data-i18n="pageLabel">Related page</span>
            <select id="page">
              <option value="hub" data-i18n="pageHub">Hub</option>
              <option value="calculator" data-i18n="pageCalculator">Calculator</option>
              <option value="map" data-i18n="pageMap">Map planner</option>
              <option value="lookup" data-i18n="pageLookup">Intel lookup</option>
              <option value="fort-sanc" data-i18n="pageFort">Fort / Sanc</option>
              <option value="other" data-i18n="pageOther">Other</option>
            </select>
          </label>
          <label><span data-i18n="messageLabel">Message</span>
            <textarea id="message" maxlength="2000" required data-placeholder="messagePlaceholder" placeholder="Describe the problem or feature you need."></textarea>
          </label>
          <label><span data-i18n="contactLabel">Contact or nickname</span>
            <input id="contact" maxlength="160" data-placeholder="contactPlaceholder" placeholder="Optional">
          </label>
          <button class="submit" type="submit" data-i18n="submit">Submit</button>
          <div id="status" class="status" data-i18n="ready">Submit the form to save it.</div>
        </form>
      </div>

      <aside class="panel">
        <h2 data-i18n="adminTitle">Admin review</h2>
        <p class="sub" data-i18n="adminHelp">Set ADMIN_TOKEN in Cloudflare, then use the same token to read recent feedback.</p>
        <div class="admin">
          <div class="admin-row">
            <label><span data-i18n="tokenLabel">Admin token</span>
              <input id="adminToken" type="password" autocomplete="off" data-placeholder="tokenPlaceholder" placeholder="ADMIN_TOKEN">
            </label>
            <button id="loadFeedback" type="button" data-i18n="load">Load</button>
          </div>
          <div id="adminStatus" class="status"></div>
          <div id="feedbackList" class="list"></div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const I18N = {
      en: {
        title:'Updates / Bug Reports', subtitle:'Share feature ideas, calculation bugs, translation issues, or mobile usability problems.',
        back:'Back to hub', formTitle:'Send feedback', typeLabel:'Type', typeBug:'Bug report', typeUpdate:'Feature request',
        typeTranslation:'Translation issue', typeOther:'Other', pageLabel:'Related page', pageHub:'Hub', pageCalculator:'Calculator',
        pageMap:'Map planner', pageLookup:'Intel lookup', pageFort:'Fort / Sanc', pageOther:'Other', messageLabel:'Message',
        messagePlaceholder:'Describe the problem or feature you need.', contactLabel:'Contact or nickname', contactPlaceholder:'Optional',
        submit:'Submit', ready:'Submit the form to save it.', sending:'Submitting...', saved:'Saved. Thank you for the report.',
        failed:'Could not save feedback.', adminTitle:'Admin review', adminHelp:'Set ADMIN_TOKEN in Cloudflare, then use the same token to read recent feedback.',
        tokenLabel:'Admin token', tokenPlaceholder:'ADMIN_TOKEN', load:'Load', empty:'No feedback yet.'
      },
      ko: {
        title:'\uc5c5\ub370\uc774\ud2b8 / \uc624\ub958 \uac74\uc758',
        subtitle:'\ud544\uc694\ud55c \uae30\ub2a5, \uacc4\uc0b0 \uc624\ub958, \ubc88\uc5ed \ubb38\uc81c, \ubaa8\ubc14\uc77c \ubd88\ud3b8 \uc0ac\ud56d\uc744 \ub0a8\uaca8\uc8fc\uc138\uc694.',
        back:'\ud5c8\ube0c\ub85c \ub3cc\uc544\uac00\uae30', formTitle:'\uac74\uc758 \ub0a8\uae30\uae30', typeLabel:'\uc720\ud615',
        typeBug:'\uc624\ub958 \uc81c\ubcf4', typeUpdate:'\uc5c5\ub370\uc774\ud2b8 \uac74\uc758', typeTranslation:'\ubc88\uc5ed \ubb38\uc81c', typeOther:'\uae30\ud0c0',
        pageLabel:'\uad00\ub828 \ud398\uc774\uc9c0', pageHub:'\ud5c8\ube0c', pageCalculator:'\uacc4\uc0b0\uae30', pageMap:'\ub9f5 \ud50c\ub798\ub108',
        pageLookup:'\ud50c\ub808\uc774\uc5b4 \uc815\ubcf4 \uac80\uc0c9', pageFort:'Fort / Sanc', pageOther:'\uae30\ud0c0',
        messageLabel:'\ub0b4\uc6a9', messagePlaceholder:'\uc5b4\ub5a4 \ubb38\uc81c\uac00 \uc788\uc5c8\ub294\uc9c0, \uc5b4\ub5a4 \uae30\ub2a5\uc774 \ud544\uc694\ud55c\uc9c0 \uc801\uc5b4\uc8fc\uc138\uc694.',
        contactLabel:'\uc5f0\ub77d\ucc98 \ub610\ub294 \ub2c9\ub124\uc784', contactPlaceholder:'\uc120\ud0dd \uc0ac\ud56d', submit:'\uc81c\ucd9c\ud558\uae30',
        ready:'\uc791\uc131 \ud6c4 \uc81c\ucd9c\ud558\uba74 \uc800\uc7a5\ub429\ub2c8\ub2e4.', sending:'\uc81c\ucd9c \uc911\uc785\ub2c8\ub2e4...',
        saved:'\uc800\uc7a5\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \uc54c\ub824\uc918\uc11c \uace0\ub9c8\uc6cc\uc694.', failed:'\uc800\uc7a5\ud558\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4.',
        adminTitle:'\uc6b4\uc601\uc790 \ud655\uc778', adminHelp:'Cloudflare \ud658\uacbd \ubcc0\uc218 ADMIN_TOKEN\uc744 \uc124\uc815\ud55c \ub4a4, \uac19\uc740 \ud1a0\ud070\uc73c\ub85c \ucd5c\uadfc \uac74\uc758\ub97c \ud655\uc778\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4.',
        tokenLabel:'\uad00\ub9ac\uc790 \ud1a0\ud070', tokenPlaceholder:'ADMIN_TOKEN', load:'\ubd88\ub7ec\uc624\uae30', empty:'\uc544\uc9c1 \uac74\uc758\uac00 \uc5c6\uc2b5\ub2c8\ub2e4.'
      }
    };
    ['zh-CN','zh-TW','fr','de','th','id'].forEach((lang) => { I18N[lang] = I18N.en; });
    const LANGUAGE_LABELS = {
      ko:'\ud55c\uad6d\uc5b4', en:'English', 'zh-CN':'\u7b80\u4f53\u4e2d\u6587', 'zh-TW':'\u7e41\u9ad4\u4e2d\u6587',
      fr:'Francais', de:'Deutsch', th:'\u0e44\u0e17\u0e22', id:'Indonesia'
    };
    const $ = (id) => document.getElementById(id);
    let currentLang = new URL(location.href).searchParams.get('lang') || localStorage.getItem('siteLang') || localStorage.getItem('lang') || 'ko';
    if (!I18N[currentLang]) currentLang = 'ko';
    function tr(key) { return I18N[currentLang]?.[key] || I18N.en[key] || key; }
    function applyLang(lang) {
      currentLang = I18N[lang] ? lang : 'ko';
      document.documentElement.lang = currentLang;
      document.querySelectorAll('#langSelect option').forEach((option) => { option.textContent = LANGUAGE_LABELS[option.value] || option.textContent; });
      document.querySelectorAll('[data-i18n]').forEach((node) => { node.textContent = tr(node.dataset.i18n); });
      document.querySelectorAll('[data-placeholder]').forEach((node) => { node.placeholder = tr(node.dataset.placeholder); });
      $('langSelect').value = currentLang;
      $('backLink').href = `./index.html?lang=${encodeURIComponent(currentLang)}`;
      localStorage.setItem('lang', currentLang);
      localStorage.setItem('siteLang', currentLang);
      const url = new URL(location.href);
      url.searchParams.set('lang', currentLang);
      history.replaceState(null, '', url);
    }
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    $('feedbackForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = event.currentTarget.querySelector('button[type="submit"]');
      button.disabled = true;
      $('status').className = 'status';
      $('status').textContent = tr('sending');
      try {
        const response = await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ type: $('type').value, page: $('page').value, message: $('message').value, contact: $('contact').value, lang: currentLang, url: location.href }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) throw new Error(data.error || response.statusText);
        $('status').className = 'status ok';
        $('status').textContent = tr('saved');
        $('message').value = '';
      } catch (error) {
        $('status').className = 'status bad';
        $('status').textContent = `${tr('failed')} ${error.message || ''}`.trim();
      } finally {
        button.disabled = false;
      }
    });
    $('loadFeedback').addEventListener('click', async () => {
      const token = $('adminToken').value.trim();
      $('adminStatus').className = 'status';
      $('adminStatus').textContent = tr('sending');
      $('feedbackList').innerHTML = '';
      try {
        const response = await fetch(`/api/feedback?limit=80&token=${encodeURIComponent(token)}`);
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) throw new Error(data.error || response.statusText);
        const items = data.items || [];
        $('adminStatus').textContent = items.length ? `${items.length} items` : tr('empty');
        $('feedbackList').innerHTML = items.map((item) => `<article class="item"><div class="meta"><span class="pill">${escapeHtml(item.type)}</span><span class="pill">${escapeHtml(item.page || '-')}</span><span class="pill">${escapeHtml(item.lang || '-')}</span><span class="pill">${escapeHtml(item.createdAt || '')}</span></div><div class="message">${escapeHtml(item.message)}</div>${item.contact ? `<div class="meta"><span class="pill">${escapeHtml(item.contact)}</span></div>` : ''}</article>`).join('');
      } catch (error) {
        $('adminStatus').className = 'status bad';
        $('adminStatus').textContent = error.message || tr('failed');
      }
    });
    $('langSelect').addEventListener('change', (event) => applyLang(event.target.value));
    applyLang(currentLang);
  </script>
</body>
</html>
