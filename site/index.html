<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kingshot Calculator Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1724;
      --panel: #162235;
      --panel-2: #1c2b42;
      --line: rgba(214, 232, 255, 0.16);
      --text: #f4f8ff;
      --muted: #aebed3;
      --accent: #29d3c2;
      --gold: #ffcf5a;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(41, 211, 194, 0.14), transparent 34%),
        radial-gradient(circle at 80% 10%, rgba(255, 207, 90, 0.16), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: Inter, Pretendard, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(980px, 100%);
    }

    .top {
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      display: grid;
      gap: 14px;
      min-height: 230px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)), var(--panel);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: rgba(41, 211, 194, 0.52);
      background: linear-gradient(180deg, rgba(41, 211, 194, 0.11), rgba(255, 255, 255, 0.03)), var(--panel);
    }

    .label {
      width: fit-content;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .button {
      align-self: end;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
      width: fit-content;
      padding: 0 15px;
      border-radius: 8px;
      background: var(--accent);
      color: #07151f;
      font-size: 13px;
      font-weight: 900;
    }

    .card:nth-child(2) .button {
      background: var(--gold);
      color: #171004;
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 720px) {
      body {
        padding: 18px;
        place-items: start center;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 190px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <h1>Kingshot Calculator Hub</h1>
      <p class="subtitle">기존 계산기와 지도 배치 계산기를 한 곳에서 바로 열 수 있습니다.</p>
    </section>

    <section class="grid" aria-label="Calculator links">
      <a class="card" href="./troop_training_ui.html">
        <span class="label">CALCULATOR</span>
        <h2>Kingshot Calculator</h2>
        <p>훈련, 장비, VIP, 패스, Fort / Sanc 분배 등 기존 계산기 허브를 엽니다.</p>
        <span class="button">기존 계산기 열기</span>
      </a>

      <a class="card" href="./traplace/?lang=ko">
        <span class="label">MAP PLANNER</span>
        <h2>War Map Planner</h2>
        <p>도시, 함정, 깃발, 본부 배치를 만들고 도시-함정 및 선택 개체 간 거리를 계산합니다.</p>
        <span class="button">지도 계산기 열기</span>
      </a>
    </section>

    <div class="footer">Created by #885 Legend nashsh</div>
  </main>
</body>
</html>
