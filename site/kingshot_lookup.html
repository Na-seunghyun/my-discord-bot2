<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kingshot Intel Lookup</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101417;
      --panel: #182026;
      --panel-2: #202b33;
      --line: rgba(214, 232, 255, .14);
      --text: #f5f8fb;
      --muted: #a9b8c4;
      --accent: #40d7bd;
      --gold: #f2c45a;
      --bad: #ff7777;
      --shadow: 0 18px 50px rgba(0, 0, 0, .34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Pretendard, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .shell { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 22px 0 34px; }
    .topbar, .top-actions, .row, .person, .chips { display: flex; align-items: center; gap: 10px; }
    .topbar { justify-content: space-between; margin-bottom: 18px; }
    .top-actions { flex-wrap: wrap; justify-content: flex-end; }
    a, button, select, input { font: inherit; }
    a { color: inherit; text-decoration: none; }
    .back, .support, button {
      border: 1px solid var(--line);
      border-radius: 7px;
      min-height: 40px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 850;
      cursor: pointer;
    }
    .back, .secondary { background: var(--panel-2); color: var(--text); }
    .support, button:not(.secondary):not(.close) { background: var(--accent); border-color: transparent; color: #071513; }
    button:disabled { opacity: .55; cursor: wait; }
    select, input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #11191f;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
    }
    select { width: auto; min-width: 112px; background: #e8f2f7; color: #0d1820; }
    select option { background: #f6fbff; color: #0d1820; }
    h1 { margin: 0; font-size: clamp(28px, 5vw, 48px); letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    .subtitle { margin: 8px 0 18px; color: var(--muted); }
    .tools { display: grid; grid-template-columns: 1.1fr .9fr; gap: 14px; margin-bottom: 14px; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 14px; align-items: start; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .row input { flex: 1; min-width: 0; }
    .hint, .sub { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .status {
      margin: 12px 0 14px;
      padding: 12px 14px;
      border: 1px solid rgba(64, 215, 189, .28);
      border-radius: 8px;
      background: rgba(64, 215, 189, .08);
      color: #d9fff8;
      font-weight: 760;
    }
    .bad { color: var(--bad); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #121a20;
      padding: 13px;
      cursor: pointer;
    }
    .card:hover { border-color: rgba(64, 215, 189, .48); }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 7px;
      object-fit: cover;
      display: grid;
      place-items: center;
      background: var(--panel-2);
      color: var(--gold);
      font-weight: 900;
      flex: 0 0 auto;
    }
    .name { font-weight: 950; overflow-wrap: anywhere; }
    .chips { flex-wrap: wrap; margin-top: 12px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 9px;
      color: #d7e2ea;
      background: rgba(255, 255, 255, .04);
      font-size: 12px;
      font-weight: 780;
    }
    .chip.gold { color: #2b1d04; background: var(--gold); border-color: transparent; }
    .empty { color: var(--muted); padding: 12px; border: 1px dashed var(--line); border-radius: 8px; }
    .metric { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
    .metric-item, .detail-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #121a20;
    }
    .metric-item span, .detail-box span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .metric-item strong, .detail-box strong { overflow-wrap: anywhere; }
    .side-list { display: grid; gap: 8px; }
    .alliance { display: flex; justify-content: space-between; gap: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #121a20; }
    .alliance span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }
    dialog {
      width: min(940px, calc(100% - 24px));
      max-height: min(86vh, 820px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    dialog[open] { display: flex; flex-direction: column; }
    dialog::backdrop { background: rgba(3, 8, 12, .72); }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(24, 32, 38, .96);
      backdrop-filter: blur(14px);
    }
    .modal-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mini-action {
      min-height: 36px;
      border-radius: 8px;
      padding: 0 12px;
      background: linear-gradient(135deg, rgba(64, 215, 189, .95), rgba(242, 196, 90, .92));
      color: #071015;
      font-size: 12px;
      font-weight: 950;
    }
    .close { background: var(--panel-2); color: var(--text); }
    .modal-body { padding: 16px; overflow: auto; min-height: 0; }
    .detail-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .loadout-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .hero-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #16222a, #0e151a);
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0, 0, 0, .22);
    }
    .hero-art {
      display: grid;
      place-items: end start;
      min-height: 172px;
      padding: 10px;
      background:
        radial-gradient(circle at 70% 16%, rgba(242, 196, 90, .28), transparent 34%),
        linear-gradient(160deg, rgba(64, 215, 189, .20), rgba(122, 92, 255, .14));
      position: relative;
    }
    .hero-art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center bottom; opacity: .96; }
    .hero-id {
      position: relative;
      z-index: 1;
      border-radius: 999px;
      padding: 5px 8px;
      background: rgba(5, 11, 15, .72);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
    }
    .hero-body { padding: 12px; }
    .star-row { display: flex; gap: 3px; margin: 8px 0 2px; color: var(--gold); font-size: 13px; }
    .hero-line { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 8px; color: var(--muted); font-size: 12px; }
    .hero-line strong { color: var(--text); }
    .gear-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; margin-top: 10px; }
    .gear-chip {
      position: relative;
      display: grid;
      grid-template-columns: 44px 1fr;
      align-items: center;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      background: var(--gear-bg, rgba(255, 255, 255, .04));
      font-size: 12px;
      color: #d7e2ea;
      min-height: 62px;
      overflow: hidden;
    }
    .gear-chip::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.16), transparent 46%);
      pointer-events: none;
    }
    .gear-chip img {
      position: relative;
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 7px;
      background: rgba(0, 0, 0, .24);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .gear-chip > div { position: relative; min-width: 0; }
    .gear-chip strong { display: block; color: var(--text); font-size: 12px; overflow-wrap: anywhere; }
    .gear-chip span { display: block; color: #d7e2ea; font-size: 11px; margin-top: 2px; }
    .gear-rarity {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      margin-top: 5px;
      background: rgba(0,0,0,.22);
      color: var(--gear-accent, #fff);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .gear-enh {
      position: absolute;
      top: 6px;
      left: 6px;
      z-index: 1;
      min-width: 28px;
      border-radius: 999px;
      padding: 2px 6px;
      background: rgba(4, 8, 12, .78);
      color: var(--gear-accent, #fff);
      font-size: 11px;
      font-weight: 950;
      text-align: center;
    }
    .weapon-line {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(242, 196, 90, .32);
      border-radius: 7px;
      padding: 7px;
      background: rgba(242, 196, 90, .08);
      font-size: 12px;
      font-weight: 850;
    }
    .weapon-line img { width: 28px; height: 28px; object-fit: contain; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 7px; text-align: left; vertical-align: top; }
    th { color: var(--muted); }
    @media (max-width: 920px) {
      .tools, .layout, .grid, .detail-grid, .loadout-grid { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .top-actions, .back { width: 100%; }
      select { width: 100%; }
    }
    @media (max-width: 560px) {
      .shell { width: min(100% - 18px, 520px); padding-top: 12px; }
      .row { flex-direction: column; align-items: stretch; }
      button, .support { width: 100%; }
      .metric { grid-template-columns: 1fr; }
      .panel { padding: 13px; }
      .modal-head { align-items: flex-start; flex-direction: column; }
    }
  </style>

      return `<article class="card" data-player-id="${player.id}">
        <div class="person">${avatar(player)}<div><div class="name">${escapeHtml(player.username || player.id)}</div><div class="sub">ID ${player.id || '-'} · K${player.state || '-'}</div></div></div>
        <div class="chips">${town}${power}${alliance}<span class="chip">Updated ${ago(player.last_refreshed_at)}</span></div>
      </article>`;
    }
    function renderPlayers(players, title = tr('resultsTitle')) {
      $('mainTitle').textContent = title;
      if (!players || !players.length) {
        resultsEl.innerHTML = `<div class="empty">${tr('noLoadout')}</div>`;
        return;
      }
      resultsEl.innerHTML = players.map(playerCard).join('');
      resultsEl.querySelectorAll('[data-player-id]').forEach(card => card.addEventListener('click', () => openPlayer(card.dataset.playerId)));
    }
    function setBusy(isBusy) {
      document.querySelectorAll('button').forEach(btn => { if (btn.id !== 'closeModal') btn.disabled = isBusy; });
    }
    async function searchPlayers() {
      const q = $('playerQuery').value.trim();
      if (!q) return setStatus(`<span class="bad">${tr('enterSearch')}</span>`);
      if (/^\d{3,}$/.test(q)) return openPlayer(q);
      setBusy(true);
      setStatus(`Searching <strong>${escapeHtml(q)}</strong>...`);
      try {
        const data = await api(`/players/search?q=${encodeURIComponent(q)}&limit=80`);
        renderPlayers(data.players || [], `${tr('resultsTitle')}: ${q}`);
        const cacheNote = data._cache ? ' · local cache' : '';
        setStatus(`<strong>${fmt(data.total || (data.players || []).length)}</strong> players found${cacheNote}`);
      } catch (error) {
        setStatus(`<span class="bad">${tr('searchFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        setBusy(false);
      }
    }
    async function loadKingdom() {
      const kid = $('kingdomInput').value.trim();
      if (!/^\d+$/.test(kid)) return setStatus(`<span class="bad">${tr('enterKingdom')}</span>`);
      setBusy(true);
      setStatus(`Loading kingdom <strong>${kid}</strong>...`);
      try {
        const data = await api(`/kingdoms/${kid}`);
        renderKingdom(data);
        renderPlayers(data.top_players || [], `K${kid} Top Players`);
        setStatus(`K<strong>${kid}</strong> · tracked players ${fmt(data.tracked_players || 0)} · alliances ${(data.alliances || []).length}`);
      } catch (error) {
        setStatus(`<span class="bad">${tr('kingdomFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        setBusy(false);
      }
    }
    function renderKingdom(data) {
      const grade = data.grades && data.grades.overall;
      const kvk = data.kvk || {};
      const stats = data.stats || [];
      const alliances = data.alliances || [];
      $('sideTitle').textContent = `K${data.kid} ${tr('kingdomInfo')}`;
      kingdomSummaryEl.className = '';
      kingdomSummaryEl.innerHTML = `<div class="metric">
        <div class="metric-item"><span>Grade</span><strong>${grade ? `${grade.letter} #${grade.rank}` : '-'}</strong></div>
        <div class="metric-item"><span>Tracked</span><strong>${fmt(data.tracked_players || 0)}</strong></div>
        <div class="metric-item"><span>Castle</span><strong>${escapeHtml(kvk.castle_name || '-')}</strong></div>
        <div class="metric-item"><span>Alliances</span><strong>${fmt(alliances.length)}</strong></div>
      </div>
      <div class="chips">${stats.slice(0, 6).map(item => `<span class="chip">${escapeHtml(item.label)} #${fmt(item.rank)} · ${fmt(item.total)}</span>`).join('')}</div>
      <div class="side-list">${alliances.slice(0, 24).map(a => `<div class="alliance"><div><strong>${escapeHtml(a.abbr || '-')} ${escapeHtml(a.name || '')}</strong><span>members ${fmt(a.tracked_members || a.member_count || 0)} · rank ${a.power_rank || '-'}</span></div><strong>${fmt(a.power || 0)}</strong></div>`).join('')}</div>`;
    }
    async function openPlayer(id) {
      if (!id) return;
      currentPlayerId = String(id);
      setBusy(true);
      setStatus(`Loading player <strong>${escapeHtml(id)}</strong>...`);
      modal.showModal();
      $('modalTitle').innerHTML = `<div class="sub">${tr('loadingDetail')}</div>`;
      $('modalBody').innerHTML = `<div class="empty">${tr('loadingDetail')}</div>`;
      try {
        const [player, history, redemptions, kingdata, standings, loadout] = await Promise.all([
          api(`/players/${encodeURIComponent(id)}`),
          api(`/players/${encodeURIComponent(id)}/history`).catch(() => []),
          api(`/players/${encodeURIComponent(id)}/redemptions`).catch(() => ({ redemptions: [] })),
          api(`/players/${encodeURIComponent(id)}/kingdata`).catch(() => null),
          api(`/players/${encodeURIComponent(id)}/standings`).catch(() => ({ standings: [] })),
          api(`/players/${encodeURIComponent(id)}/loadout?cached=1`).catch(() => null),
        ]);
        renderPlayerModal(player, history || [], redemptions || {}, kingdata, standings || {}, loadout);
        const cacheNote = player._cache ? ' · local cache' : '';
        setStatus(`Loaded <strong>${escapeHtml(player.username || player.id)}</strong>${cacheNote}`);
      } catch (error) {
        $('modalTitle').innerHTML = '<div class="sub">Load failed</div>';
        $('modalBody').innerHTML = `<div class="empty">${tr('detailFail')}: ${escapeHtml(error.message)}</div>`;
        setStatus(`<span class="bad">${tr('detailFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        setBusy(false);
      }
    }
    async function refreshCurrentPlayer() {
      if (!currentPlayerId) return;
      const btn = $('refreshPlayerBtn');
      btn.disabled = true;
      setStatus(`Refreshing player <strong>${escapeHtml(currentPlayerId)}</strong>...`);
      try {
        await api('/players', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: currentPlayerId })
        });
        await openPlayer(currentPlayerId);
      } catch (error) {
        setStatus(`<span class="bad">${tr('detailFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        btn.disabled = false;
      }
    }
    const assetUrl = (path) => `${REMOTE_ORIGIN}${path}`;
    const heroBust = (id) => assetUrl(`/assets/heroes_bust/${encodeURIComponent(id)}.png`);
    const weaponArt = (id) => assetUrl(`/assets/exclusive_weapons/${encodeURIComponent(id)}.png`);
    const gearArt = (item) => {
      const value = Number(item && item.eid) || 0;
      if (value) return weaponArt(value);
      const fallback = Number(item && (item.gid || item.id || item.equipid)) || 0;
      if (fallback > 1000) return assetUrl(`/assets/gear/${fallback}.png`);
      return '';
    };
    const gearTiers = [
      { lvl: 0, label: 'Green', bg: 'linear-gradient(145deg,#243f31,#111c18)', accent: '#34d399' },
      { lvl: 3, label: 'Blue', bg: 'linear-gradient(145deg,#1f3c62,#101823)', accent: '#60a5fa' },
      { lvl: 7, label: 'Epic', bg: 'linear-gradient(145deg,#46296d,#191326)', accent: '#a78bfa' },
      { lvl: 15, label: 'Legend', bg: 'linear-gradient(145deg,#684719,#21160a)', accent: '#fbbf24' },
      { lvl: 31, label: 'Red', bg: 'linear-gradient(145deg,#6a2028,#230c11)', accent: '#fb7185' },
      { lvl: 43, label: 'Mythic', bg: 'linear-gradient(145deg,#7b2434,#261018)', accent: '#ff8ea3' }
    ];
    const gearEnhance = (value) => {
      const raw = Number(value) || 0;
      return raw > 100 ? { level: raw - 100, ascended: true } : { level: raw, ascended: false };
    };
    const gearVisual = (item) => {
      const enhance = gearEnhance(item && item.slv);
      let tier = gearTiers[0];
      for (const candidate of gearTiers) {
        if (enhance.level >= candidate.lvl) tier = candidate;
      }
      if (enhance.ascended) {
        return { ...tier, label: 'Ascended', bg: 'linear-gradient(145deg,#7c2d12,#2a1006)', accent: '#fb923c', enhance };
      }
      return { ...tier, enhance };
    };
    function starText(star) {
      const value = Number(star) || 0;
      if (!value) return '-';
      const rarity = Math.max(0, Math.floor((value - 1) / 5));
      const stars = ((value - 1) % 5) + 1;
      return `R${rarity} - ${stars} stars`;
    }
    function equipmentName(slot) {
      return ({ 1: 'Weapon', 2: 'Armor', 3: 'Helmet', 4: 'Boots' })[slot] || `Slot ${slot || '-'}`;
    }
    function renderLoadout(loadout) {
      const heroes = loadout && Array.isArray(loadout.heroes) ? loadout.heroes : [];
      if (!heroes.length) {
        return `<h2 style="margin-top:18px">Heroes & Gear</h2><div class="empty">${tr('noLoadout')}</div>`;
      }
      const fetched = loadout.fetched_at ? `<span class="chip">Fetched ${ago(loadout.fetched_at)}</span>` : "";
      const stale = loadout.stale ? `<span class="chip">Cached data may be stale</span>` : "";
      const cards = heroes
        .slice()
        .sort((a, b) => (a.slot || 0) - (b.slot || 0))
        .map((hero) => {
          const weaponLevel = hero.exclusive_equip_lv ?? hero.exclusive_lv ?? hero.exclusive_level ?? hero.widget_lv ?? "-";
          const weapon = hero.exclusive_equip ? `<div class="weapon-line"><img src="${weaponArt(hero.exclusive_equip)}" alt="" onerror="this.style.visibility='hidden'"><span>Exclusive Lv ${escapeHtml(weaponLevel)}</span></div>` : "";
          const gear = (hero.equipment || [])
            .slice()
            .sort((a, b) => (a.sid || 0) - (b.sid || 0))
            .map((item) => {
              const art = gearArt(item);
              const visual = gearVisual(item);
              const icon = art ? `<img src="${art}" alt="" onerror="this.style.visibility='hidden'">` : "<span></span>";
              return `<div class="gear-chip" style="--gear-bg:${visual.bg};--gear-accent:${visual.accent}"><span class="gear-enh">+${escapeHtml(visual.enhance.level)}</span>${icon}<div><strong>${equipmentName(item.sid)}</strong><span>Forge Lv ${escapeHtml(item.rlv ?? 0)}</span><em class="gear-rarity">${visual.label}</em></div></div>`;
            })
            .join("");
          return `<article class="hero-card">
            <div class="hero-art"><img src="${heroBust(hero.id)}" alt="" onerror="this.style.visibility='hidden'"><span class="hero-id">Hero ${escapeHtml(hero.id)}</span></div>
            <div class="hero-body">
              <div class="hero-line"><span>Slot</span><strong>${escapeHtml(hero.slot || hero.pos || "-")}</strong></div>
              <div class="hero-line"><span>Level</span><strong>${escapeHtml(hero.lv ?? "-")}</strong></div>
              <div class="hero-line"><span>Stars</span><strong>${escapeHtml(starText(hero.star))}</strong></div>
              ${weapon}
              <div class="gear-list">${gear || '<div class="empty">No gear</div>'}</div>
            </div>
          </article>`;
        })
        .join("");
      return `<h2 style="margin-top:18px">Heroes & Gear</h2><div class="chips" style="margin-bottom:10px">${fetched}${stale}</div><div class="loadout-grid">${cards}</div>`;
    }
    function renderPlayerModal(player, history, redemptions, kingdata, standings, loadout) {
      $('modalTitle').innerHTML = `${avatar(player)}<div><div class="name">${escapeHtml(player.username || player.id)}</div><div class="sub">ID ${player.id} · K${player.state || '-'} · ${escapeHtml(player.alliance_abbr || player.alliance_name || '-')}</div></div>`;
      const boxes = [
        ['Power', fmt(player.power)], ['Town Center', player.town_hall_level || '-'], ['Life Tree', player.life_tree_level || '-'], ['Mystic Score', fmt(player.mystic_trial_score)],
        ['Mystic Rank', player.mystic_trial_rank ? `#${player.mystic_trial_rank}` : '-'], ['Updated', ago(player.last_refreshed_at)], ['Crowns', kingdata && kingdata.crowns != null ? kingdata.crowns : '-'], ['Kingdoms ruled', kingdata && kingdata.kingdoms_ruled != null ? kingdata.kingdoms_ruled : '-'],
      ];
      const standingRows = (standings.standings || []).slice(0, 14).map(row => `<tr><td>${escapeHtml(row.label || row.board_type)}</td><td>#${fmt(row.rank)}</td><td>${fmt(row.score)}</td><td>${row.kid ? `K${row.kid}` : '-'}</td></tr>`).join('');
      const historyRows = history.slice(0, 12).map(row => `<tr><td>${escapeHtml(row.username || '-')}</td><td>K${row.state || '-'}</td><td>${escapeHtml(row.alliance_abbr || row.alliance_name || '-')}</td><td>${fmt(row.power || '')}</td><td>${ago(row.recorded_at)}</td></tr>`).join('');
      const codeRows = (redemptions.redemptions || []).slice(0, 12).map(row => `<tr><td>${escapeHtml(row.Code || row.code || '-')}</td><td>${escapeHtml(row.Status || row.status || '-')}</td><td>${ago(row.RedeemedAt || row.redeemed_at)}</td></tr>`).join('');
      $('modalBody').innerHTML = `<div class="detail-grid">${boxes.map(([label, value]) => `<div class="detail-box"><span>${label}</span><strong>${escapeHtml(value)}</strong></div>`).join('')}</div>
        ${renderLoadout(loadout)}
        <h2 style="margin-top:18px">Standings</h2>${standingRows ? `<table><thead><tr><th>Board</th><th>Rank</th><th>Score</th><th>Kingdom</th></tr></thead><tbody>${standingRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}
        <h2 style="margin-top:18px">History</h2>${historyRows ? `<table><thead><tr><th>Name</th><th>Kingdom</th><th>Alliance</th><th>Power</th><th>Recorded</th></tr></thead><tbody>${historyRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}
        <h2 style="margin-top:18px">Codes</h2>${codeRows ? `<table><thead><tr><th>Code</th><th>Status</th><th>Time</th></tr></thead><tbody>${codeRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}`;
    }
    $('searchBtn').addEventListener('click', searchPlayers);
    $('directBtn').addEventListener('click', () => openPlayer($('playerQuery').value.trim()));
    $('kingdomBtn').addEventListener('click', loadKingdom);
    $('refreshPlayerBtn').addEventListener('click', refreshCurrentPlayer);
    $('closeModal').addEventListener('click', () => modal.close());
    $('playerQuery').addEventListener('keydown', event => { if (event.key === 'Enter') searchPlayers(); });
    $('kingdomInput').addEventListener('keydown', event => { if (event.key === 'Enter') loadKingdom(); });
    $('langSelect').addEventListener('change', event => applyLang(event.target.value));
    const MOSAIC_AVATARS = [
      ['0df220779a6ac2f6edc7267d866a143f.png', 'RALLY', 4],
      ['8aee124535ab86ba9092d572fe96d90c.png', 'MARTINA', 8],
      ['1965ad455c3bc5860c095e64b9b643ee.png', 'YETI', 5],
      ['bde817bef7f39d67c85737e39e9649b5.png', 'DAEGUN', 5],
      ['5997f17685608a4c3d8fadd629df89b0.png', 'BRAIN', 6],
      ['5058313b9c1471ae1cc77a3342bf5bb4.png', 'MINI', 5],
      ['cc788e10d1f9830bd0adddca19bc8054.png', 'BULMA', 7],
      ['9e33fbbe9aeb778d511c7c512938697e.png', 'GIRLY', 8],
      ['1a67fbb55bbfcbe7588f60c72a81ccd3.png', 'DEUS', 8],
      ['b82be869f392bf2a2dc77464d669414f.png', 'JOSE', 5],
      ['e8cda2219a1772cd63cb048fc0b96157.png', 'ZEROZ', 5],
      ['2d699c71bc7b3199bfd91dad603785cb.png', 'TYLER', 5],
      ['c48046f48d8423554f4a8c9afdb28752.png', 'YEON', 1],
      ['e0850652b08d8e5013f264415a096a43.png', 'SNICKER', 5],
      ['1d9e7fe1943c672c9fb690bec24bfbb6.png', 'COOKIE', 5],
      ['0957a1748b6f3c2098559175b45c93b4.png', 'MORRIGAN', 5],
      ['2786f821168dd0607b6c625a7366ec4d.png', 'MISAKA', 8],
      ['cdcd9fb69ef7253065ce71a734bab222.png', 'COLBA', 6],
      ['a9101864dcec444e5f35cf4df18b0e08.png', 'CHEF', 5],
      ['c838335cb675d13231c5c35dd79eaa3d.png', 'EVIL', 2],
    ];
    function renderIntelMosaic() {
      const wrap = $('intelMosaic');
      if (!wrap) return;
      const items = Array.from({ length: 56 }, (_, index) => {
        const [avatarName, name, tg] = MOSAIC_AVATARS[(index * 7 + 3) % MOSAIC_AVATARS.length];
        const kingdoms = [57, 86, 100, 162, 205, 240, 271, 386, 401, 529, 652, 688, 734, 753, 766, 777, 823, 832, 846, 888, 954, 958, 979, 1448, 1819, 1846, 2050];
        const kingdom = kingdoms[(index * 11 + tg) % kingdoms.length];
        const tag = ['BRO', 'RAT', 'KING', 'GOAT', 'QUEEN', 'F2P', 'SR', 'KOR'][index % 8];
        return `<div class="intel-tile">
          <img src="${REMOTE_ORIGIN}/avatars/${avatarName}" alt="" loading="lazy">
          <span class="intel-kingdom">#${kingdom}</span>
          <span class="intel-tg">TG${tg}</span>
          <span class="intel-tag">${tag}</span>
          <span class="intel-name">${escapeHtml(name)} <b>#${kingdom}</b></span>
        </div>`;
      });
      wrap.innerHTML = items.join('');
    }
    renderIntelMosaic();
    applyLang(detectLang());
  </script>
</body>
</html>
