<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kingshot Intel Command Deck</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070912;
      --bg2: #10131f;
      --panel: rgba(16, 20, 32, .86);
      --panel2: rgba(24, 30, 46, .9);
      --line: rgba(255,255,255,.13);
      --line2: rgba(79, 229, 255, .34);
      --text: #f8fbff;
      --muted: #aeb9c7;
      --faint: #748195;
      --pink: #ff3ca7;
      --cyan: #4fe5ff;
      --gold: #ffd76a;
      --violet: #a875ff;
      --red: #ff6677;
      --green: #5dffbd;
      --shadow: 0 24px 70px rgba(0,0,0,.45);
      --radius: 10px;
      font-family: Inter, Pretendard, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 4%, rgba(255,60,167,.28), transparent 28%),
        radial-gradient(circle at 92% 0%, rgba(79,229,255,.22), transparent 30%),
        linear-gradient(180deg, #090713, #070912 44%, #090d14);
      font-family: var(--font, Inter), Pretendard, ui-sans-serif, system-ui, sans-serif;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 76px 76px;
      opacity: .32;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }
    a, button, input, select { font: inherit; }
    a { color: inherit; text-decoration: none; }
    button, .link-button, select, input {
      min-height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255,255,255,.07);
    }
    button, .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    button:hover, .link-button:hover { transform: translateY(-1px); border-color: rgba(79,229,255,.5); box-shadow: 0 0 24px rgba(79,229,255,.13); }
    button:disabled { opacity: .55; cursor: wait; transform: none; box-shadow: none; }
    .primary { border-color: transparent; background: linear-gradient(135deg, var(--pink), #ff82cb); color: white; }
    .gold { border-color: transparent; background: linear-gradient(135deg, var(--gold), #fff0a8); color: #211804; }
    input, select {
      width: 100%;
      padding: 0 12px;
      outline: none;
      background: rgba(5,8,14,.82);
    }
    select option { color: #0e1520; background: #f4f8ff; }
    input:focus, select:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(79,229,255,.14); }
    .shell { width: min(1260px, calc(100% - 28px)); margin: 0 auto; padding: 16px 0 36px; }
    .topbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--radius);
      background: rgba(11, 12, 22, .78);
      box-shadow: 0 18px 50px rgba(0,0,0,.34);
      backdrop-filter: blur(18px);
    }
    .top-actions, .row, .chips, .person { display: flex; align-items: center; gap: 10px; }
    .top-actions { flex-wrap: wrap; justify-content: flex-end; }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-height: 30px;
      padding: 0 11px;
      border: 1px solid rgba(255,60,167,.42);
      border-radius: 999px;
      color: #ffd7ef;
      background: linear-gradient(135deg, rgba(255,60,167,.2), rgba(79,229,255,.09));
      font-size: 12px;
      font-weight: 1000;
    }
    .brand::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 18px rgba(79,229,255,.9);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, .95fr) minmax(360px, 1.05fr);
      gap: 16px;
      align-items: stretch;
      margin-bottom: 16px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255,60,167,.13), transparent 46%),
        linear-gradient(220deg, rgba(79,229,255,.09), transparent 42%),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      min-width: 0;
    }
    .intro { padding: 24px; display: grid; align-content: space-between; gap: 24px; }
    h1 { margin: 10px 0 10px; font-size: clamp(34px, 6.2vw, 72px); line-height: .92; letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    p { color: var(--muted); line-height: 1.55; }
    .subtitle { max-width: 64ch; margin: 0; }
    .statline { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .stat {
      min-height: 86px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.06);
    }
    .stat strong { display: block; font-size: 25px; line-height: 1; }
    .stat span { display: block; margin-top: 7px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .search-deck { padding: 16px; display: grid; gap: 12px; }
    .search-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }
    .kingdom-box { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; }
    .status {
      padding: 13px 14px;
      border: 1px solid rgba(79,229,255,.28);
      border-radius: 8px;
      background: rgba(79,229,255,.08);
      color: #e9fdff;
      font-weight: 800;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 15px 16px 0;
    }
    body.results-mode .spotlight-head,
    body.results-mode #spotlight {
      display: none;
    }
    .scout-board {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 10px;
    }
    .profile-tile {
      position: relative;
      min-height: 168px;
      overflow: hidden;
      display: grid;
      align-content: end;
      text-align: left;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 8px;
      background: #111722;
      color: white;
      padding: 0;
      isolation: isolate;
    }
    .profile-tile img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.04);
      z-index: -2;
    }
    .profile-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.2) 56%, rgba(255,60,167,.14)),
        linear-gradient(135deg, rgba(255,60,167,.24), transparent 45%);
    }
    .profile-info { padding: 10px; display: grid; gap: 6px; min-width: 0; }
    .profile-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 1000;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }
    .profile-meta { display: flex; flex-wrap: wrap; gap: 5px; }
    .mini {
      min-height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      background: rgba(0,0,0,.54);
      color: #eaf6ff;
      font-size: 11px;
      font-weight: 900;
    }
    .mini.tg { color: #241704; background: linear-gradient(135deg, var(--gold), #fff0a8); }
    .results {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: rgba(255,255,255,.055);
      cursor: pointer;
      min-width: 0;
    }
    .card:hover { border-color: rgba(79,229,255,.52); }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.08);
      color: var(--gold);
      font-weight: 1000;
      flex: 0 0 auto;
    }
    .name { font-weight: 1000; overflow-wrap: anywhere; }
    .sub, .hint { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .chips { flex-wrap: wrap; margin-top: 11px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: #dfe8f2;
      font-size: 12px;
      font-weight: 800;
    }
    .chip.gold { background: linear-gradient(135deg, var(--gold), #fff0a8); color: #241704; border-color: transparent; }
    .chip.pink { background: rgba(255,60,167,.18); color: #ffd8ef; border-color: rgba(255,60,167,.3); }
    .side { padding: 16px; display: grid; gap: 10px; }
    .empty {
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
    }
    .metric {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }
    .metric-item, .detail-box, .alliance {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: rgba(255,255,255,.055);
    }
    .metric-item span, .detail-box span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .metric-item strong, .detail-box strong { overflow-wrap: anywhere; }
    .alliance { display: flex; justify-content: space-between; gap: 10px; }
    dialog {
      width: min(1140px, calc(100% - 22px));
      max-height: min(90vh, 900px);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 18% 0%, rgba(255,60,167,.18), transparent 34%),
        radial-gradient(circle at 86% 8%, rgba(79,229,255,.16), transparent 36%),
        rgba(8, 10, 18, .98);
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 0;
      overflow: hidden;
    }
    dialog[open] { display: flex; flex-direction: column; }
    dialog::backdrop { background: rgba(2,4,8,.78); backdrop-filter: blur(5px); }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(90deg, rgba(255,60,167,.13), rgba(79,229,255,.08)),
        rgba(8, 10, 18, .92);
      box-shadow: 0 12px 38px rgba(0,0,0,.28);
      backdrop-filter: blur(18px);
    }
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .modal-body { padding: 16px; overflow: auto; min-height: 0; }
    .modal-body.premium { display: grid; gap: 14px; }
    .premium-profile {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 16px;
      min-height: 230px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(255,60,167,.2), transparent 48%),
        linear-gradient(245deg, rgba(79,229,255,.16), transparent 44%),
        rgba(255,255,255,.055);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 22px 58px rgba(0,0,0,.34);
    }
    .premium-profile::before {
      content: "";
      position: absolute;
      right: -80px;
      top: -90px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,106,.24), rgba(255,60,167,.1) 42%, transparent 70%);
      pointer-events: none;
    }
    .premium-profile::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 1px, transparent 1px 9px),
        linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      opacity: .25;
      mix-blend-mode: screen;
    }
    .premium-portrait {
      position: relative;
      z-index: 1;
      min-height: 198px;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,215,106,.28), transparent 46%),
        linear-gradient(135deg, rgba(255,60,167,.22), rgba(79,229,255,.14));
    }
    .premium-portrait::after {
      content: "PROFILE";
      position: absolute;
      left: 10px;
      bottom: 10px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(0,0,0,.55);
      color: rgba(255,255,255,.78);
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: 0;
    }
    .premium-portrait img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      padding: 8px;
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.42));
    }
    .premium-summary {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: space-between;
      gap: 14px;
      min-width: 0;
    }
    .premium-title { display: grid; gap: 8px; }
    .premium-title h2 {
      margin: 0;
      color: white;
      font-size: clamp(30px, 4vw, 52px);
      line-height: .96;
      overflow-wrap: anywhere;
      text-shadow: 0 0 26px rgba(255,60,167,.18);
    }
    .premium-id { color: var(--muted); font-weight: 850; }
    .premium-badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .premium-badge {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(0,0,0,.28);
      color: #eaf6ff;
      font-size: 12px;
      font-weight: 950;
    }
    .premium-badge.hot { border-color: rgba(255,215,106,.32); background: linear-gradient(135deg, rgba(255,215,106,.22), rgba(255,60,167,.12)); color: #fff1b8; }
    .premium-stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .premium-stat {
      min-height: 78px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 9px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.08), transparent 58%),
        rgba(0,0,0,.25);
    }
    .premium-stat:nth-child(1) { border-color: rgba(255,215,106,.28); }
    .premium-stat:nth-child(2) { border-color: rgba(79,229,255,.24); }
    .premium-stat:nth-child(5) { border-color: rgba(255,60,167,.24); }
    .premium-stat span { display: block; margin-bottom: 7px; color: var(--muted); font-size: 11px; font-weight: 850; text-transform: uppercase; }
    .premium-stat strong { display: block; color: white; font-size: 19px; overflow-wrap: anywhere; }
    .premium-section {
      padding: 14px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(79,229,255,.08), transparent 48%),
        rgba(255,255,255,.045);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .premium-section h2 {
      margin-bottom: 10px;
      color: #ffffff;
      text-shadow: 0 0 22px rgba(79,229,255,.15);
    }
    .premium-section table {
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 9px;
      background: rgba(0,0,0,.18);
    }
    .profile-hero {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
      margin-bottom: 16px;
    }
    .portrait {
      min-height: 190px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(135deg, rgba(255,60,167,.22), rgba(79,229,255,.12));
    }
    .portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .loadout-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }
    .hero-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(168,117,255,.18), transparent 46%),
        rgba(255,255,255,.055);
      box-shadow: 0 18px 44px rgba(0,0,0,.25);
    }
    .hero-art {
      position: relative;
      display: grid;
      align-items: end;
      min-height: 170px;
      padding: 10px;
      background:
        radial-gradient(circle at 72% 10%, rgba(255,215,106,.28), transparent 36%),
        linear-gradient(135deg, rgba(79,229,255,.18), rgba(255,60,167,.13));
    }
    .hero-art img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
    }
    .hero-id {
      position: relative;
      width: fit-content;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,.62);
      font-size: 12px;
      font-weight: 1000;
    }
    .hero-body { padding: 12px; }
    .line { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12px; margin-bottom: 7px; }
    .line strong { color: var(--text); }
    .gear-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .gear-chip {
      position: relative;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 62px;
      padding: 7px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--gear-bg, rgba(255,255,255,.07));
      overflow: hidden;
    }
    .gear-chip::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.14), transparent 45%);
      pointer-events: none;
    }
    .gear-chip img {
      position: relative;
      width: 42px;
      height: 42px;
      object-fit: contain;
      border-radius: 7px;
      background: rgba(0,0,0,.25);
    }
    .gear-chip div { position: relative; min-width: 0; }
    .gear-chip strong { display: block; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gear-chip span { display: block; color: #dce7f3; font-size: 11px; margin-top: 2px; }
    .gear-rarity {
      display: inline-flex;
      width: fit-content;
      margin-top: 5px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(0,0,0,.28);
      color: var(--gear-accent, white);
      font-size: 10px;
      font-weight: 1000;
      font-style: normal;
      text-transform: uppercase;
    }
    .gear-enh {
      position: absolute;
      left: 5px;
      top: 5px;
      z-index: 2;
      min-width: 27px;
      padding: 1px 5px;
      border-radius: 999px;
      background: rgba(0,0,0,.72);
      color: var(--gear-accent, white);
      font-size: 11px;
      font-weight: 1000;
      text-align: center;
    }
    .weapon-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 7px;
      border: 1px solid rgba(255,215,106,.34);
      border-radius: 8px;
      background: rgba(255,215,106,.09);
      font-size: 12px;
      font-weight: 900;
    }
    .weapon-line img { width: 28px; height: 28px; object-fit: contain; }
    .modal-body.premium {
      gap: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.045), transparent 44%),
        rgba(5, 7, 13, .72);
    }
    .intel-passport {
      display: grid;
      grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(79,229,255,.13), transparent 42%),
        linear-gradient(225deg, rgba(255,215,106,.14), transparent 40%),
        rgba(255,255,255,.055);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 24px 72px rgba(0,0,0,.34);
    }
    .intel-image-card {
      position: relative;
      min-height: 290px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,215,106,.3), transparent 45%),
        linear-gradient(145deg, rgba(255,60,167,.2), rgba(79,229,255,.12)),
        rgba(0,0,0,.32);
    }
    .intel-image-card img {
      width: 100%;
      height: 100%;
      min-height: 290px;
      object-fit: contain;
      object-position: center bottom;
      padding: 14px;
      filter: drop-shadow(0 22px 32px rgba(0,0,0,.46));
    }
    .intel-image-card .profile-initial {
      display: grid;
      place-items: center;
      height: 100%;
      min-height: 290px;
      font-size: 72px;
      font-weight: 1000;
      color: var(--gold);
    }
    .intel-card-label {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(12px);
      font-size: 12px;
      font-weight: 950;
    }
    .intel-profile-card {
      display: grid;
      align-content: space-between;
      gap: 14px;
      min-width: 0;
    }
    .intel-head-card {
      padding: 18px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.09), transparent 54%),
        rgba(0,0,0,.24);
    }
    .intel-head-card .brand {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 1000;
    }
    .intel-head-card h2 {
      margin: 10px 0 6px;
      font-size: clamp(32px, 4vw, 58px);
      line-height: .96;
      overflow-wrap: anywhere;
    }
    .intel-meta-line {
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }
    .intel-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .intel-badge {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      padding: 0 11px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 999px;
      background: rgba(255,255,255,.065);
      color: #edf8ff;
      font-size: 12px;
      font-weight: 950;
    }
    .intel-badge.gold {
      border-color: rgba(255,215,106,.32);
      background: rgba(255,215,106,.13);
      color: #ffe8a6;
    }
    .intel-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .intel-stat {
      min-height: 84px;
      padding: 13px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 14px;
      background: rgba(0,0,0,.24);
    }
    .intel-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .intel-stat strong {
      display: block;
      color: white;
      font-size: 20px;
      overflow-wrap: anywhere;
    }
    .partial-alert {
      padding: 11px 12px;
      border: 1px solid rgba(255,215,106,.28);
      border-radius: 13px;
      background: rgba(255,215,106,.09);
      color: #ffe8a6;
      font-size: 12px;
      font-weight: 850;
    }
    .premium-section {
      border-radius: 16px;
    }
    @media (max-width: 900px) {
      .intel-passport { grid-template-columns: 1fr; }
      .intel-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    table { width: 100%; border-collapse: collapse; margin-top: 9px; font-size: 13px; }
    th, td { padding: 9px 7px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); }
    .bad { color: var(--red); }
    @media (max-width: 980px) {
      .hero, .layout, .profile-hero, .premium-profile { grid-template-columns: 1fr; }
      .detail-grid, .premium-stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .shell { width: min(100% - 18px, 560px); padding-top: 10px; }
      .topbar { position: relative; top: auto; align-items: stretch; flex-direction: column; }
      .top-actions { justify-content: stretch; }
      .top-actions > *, .link-button { width: 100%; }
      .search-box, .kingdom-box, .statline, .detail-grid, .gear-list, .premium-stat-grid { grid-template-columns: 1fr; }
      .scout-board { grid-template-columns: repeat(2, minmax(0, 1fr)); padding: 12px; }
      .profile-tile { min-height: 146px; }
      .results { grid-template-columns: 1fr; padding: 12px; }
      .intro, .search-deck, .side, .modal-body { padding: 13px; }
      .premium-profile { padding: 12px; }
      .modal-head { align-items: stretch; flex-direction: column; }
      .modal-actions button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="topbar">
      <a class="link-button" href="./index.html" data-i18n="back">허브로 돌아가기</a>
      <div class="top-actions">
        <select id="langSelect" aria-label="Language">
          <option value="ko">한국어</option>
          <option value="en">English</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="th">ไทย</option>
          <option value="id">Indonesia</option>
        </select>
        <a class="link-button gold" href="https://buymeacoffee.com/nashsh" target="_blank" rel="noreferrer" data-i18n="support">후원 페이지</a>
      </div>
    </nav>

    <section class="hero">
      <div class="panel intro">
        <div>
          <div class="brand">885 LEGEND NASHSH</div>
          <h1 data-i18n="title">Intel Command Deck</h1>
          <p class="subtitle" data-i18n="subtitle">플레이어 검색, 왕국 요약, 영웅 장비를 한 화면에서 확인하는 독립형 인텔 허브입니다.</p>
        </div>
        <div class="statline">
          <div class="stat"><strong id="statPlayers">-</strong><span data-i18n="storedPlayers">저장된 플레이어</span></div>
          <div class="stat"><strong id="statCache">-</strong><span data-i18n="cachedData">캐시 응답</span></div>
          <div class="stat"><strong id="statSource">SUPA</strong><span data-i18n="storageState">저장소 상태</span></div>
        </div>
      </div>
      <div class="panel search-deck">
        <h2 data-i18n="quickSearch">빠른 검색</h2>
        <div class="search-box">
          <input id="playerQuery" autocomplete="off" data-placeholder="playerPlaceholder" placeholder="닉네임 또는 플레이어 ID">
          <button id="searchBtn" class="primary" type="button" data-i18n="search">검색</button>
          <button id="directBtn" type="button" data-i18n="idDetail">ID 상세</button>
        </div>
        <div class="kingdom-box">
          <input id="kingdomInput" inputmode="numeric" autocomplete="off" data-placeholder="kingdomPlaceholder" placeholder="왕국 번호 예: 885">
          <button id="kingdomBtn" type="button" data-i18n="open">열기</button>
        </div>
        <div id="status" class="status" data-i18n="ready">검색어 또는 왕국 번호를 입력하세요.</div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div id="spotlightHead" class="section-head spotlight-head">
          <h2 id="mainTitle" data-i18n="scoutBoard">스카우트 보드</h2>
          <button id="shuffleBtn" type="button" data-i18n="shuffle">새로 보기</button>
        </div>
        <div id="spotlight" class="scout-board"><div class="empty" data-i18n="loadingTiles">프로필 블록을 불러오는 중입니다.</div></div>
        <div class="section-head">
          <h2 id="resultTitle" data-i18n="resultsTitle">검색 결과</h2>
        </div>
        <div id="results" class="results"><div class="empty" data-i18n="emptyResults">아직 표시할 정보가 없습니다.</div></div>
      </div>
      <aside class="panel side">
        <h2 id="sideTitle" data-i18n="kingdomInfo">왕국 정보</h2>
        <div id="kingdomSummary" class="empty" data-i18n="emptyKingdom">왕국 번호를 조회하면 요약이 표시됩니다.</div>
      </aside>
    </section>
  </main>

  <dialog id="playerModal">
    <div class="modal-head">
      <div id="modalTitle" class="person"></div>
      <div class="modal-actions">
        <button id="refreshPlayerBtn" class="gold" type="button" data-i18n="refresh">갱신</button>
        <button id="closeModal" type="button" data-i18n="close">닫기</button>
      </div>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </dialog>

  <script>
    const REMOTE_ORIGIN = 'https://kingshot.jeab.dev';
    const PROXY_BASE = '/kingshot';
    const I18N = {
      ko: {
        back:'허브로 돌아가기', support:'후원 페이지', title:'Intel Command Deck',
        subtitle:'플레이어 검색, 왕국 요약, 영웅 장비를 한 화면에서 확인하는 독립형 인텔 허브입니다.',
        storedPlayers:'저장된 플레이어', cachedData:'캐시 응답', storageState:'저장소 상태',
        quickSearch:'빠른 검색', playerPlaceholder:'닉네임 또는 플레이어 ID', search:'검색', idDetail:'ID 상세',
        kingdomPlaceholder:'왕국 번호 예: 885', open:'열기', ready:'검색어 또는 왕국 번호를 입력하세요.',
        scoutBoard:'스카우트 보드', shuffle:'새로 보기', loadingTiles:'프로필 블록을 불러오는 중입니다.',
        resultsTitle:'검색 결과', emptyResults:'아직 표시할 정보가 없습니다.', kingdomInfo:'왕국 정보',
        emptyKingdom:'왕국 번호를 조회하면 요약이 표시됩니다.', refresh:'갱신', close:'닫기',
        enterSearch:'검색어를 입력하세요.', enterKingdom:'왕국 번호를 입력하세요.', noResults:'검색 결과가 없습니다.',
        searchFail:'검색 결과를 불러오지 못했습니다.', kingdomFail:'왕국 정보를 불러오지 못했습니다.',
        detailFail:'플레이어 상세 정보를 불러오지 못했습니다.', loadingDetail:'플레이어 상세 정보를 불러오는 중입니다...',
        noLoadout:'수집된 영웅/장비 정보가 없습니다. 원본 서비스에 존재하는 정보만 표시됩니다.'
      },
      en: {
        back:'Back to hub', support:'Support page', title:'Intel Command Deck',
        subtitle:'An independent intel hub for player search, kingdom summaries, heroes, and gear.',
        storedPlayers:'Stored players', cachedData:'Cached responses', storageState:'Storage state',
        quickSearch:'Quick search', playerPlaceholder:'Player name or ID', search:'Search', idDetail:'ID detail',
        kingdomPlaceholder:'Kingdom number, e.g. 885', open:'Open', ready:'Enter a search term or kingdom number.',
        scoutBoard:'Scout board', shuffle:'Shuffle', loadingTiles:'Loading profile blocks.',
        resultsTitle:'Search results', emptyResults:'No information to show yet.', kingdomInfo:'Kingdom info',
        emptyKingdom:'Enter a kingdom number to load the summary.', refresh:'Refresh', close:'Close',
        enterSearch:'Enter a search term.', enterKingdom:'Enter a kingdom number.', noResults:'No results found.',
        searchFail:'Could not load search results.', kingdomFail:'Could not load kingdom info.',
        detailFail:'Could not load player details.', loadingDetail:'Loading player details...',
        noLoadout:'No collected hero or gear information is available. Only data present in the source service can be shown.'
      }
    };
    ['zh-CN','zh-TW','fr','de','th','id'].forEach(lang => { I18N[lang] = I18N.en; });

    const $ = (id) => document.getElementById(id);
    const resultsEl = $('results');
    const spotlightEl = $('spotlight');
    const statusEl = $('status');
    const modal = $('playerModal');
    let currentLang = 'ko';
    let currentPlayerId = '';

    const tr = (key) => (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
    const fmt = (value) => Number(value || 0).toLocaleString(currentLang);
    const clean = (value) => String(value ?? '');
    const escapeHtml = (value) => clean(value).replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'})[ch]);
    const imgUrl = (src) => !src ? '' : clean(src).startsWith('http') ? src : `${REMOTE_ORIGIN}${src}`;
    const assetUrl = (path) => `${REMOTE_ORIGIN}${path}`;
    const heroBust = (id) => assetUrl(`/assets/heroes_bust/${encodeURIComponent(id)}.png`);
    const weaponArt = (id) => assetUrl(`/assets/exclusive_weapons/${encodeURIComponent(id)}.png`);
    const ago = (value) => {
      if (!value || clean(value).startsWith('0001-')) return 'unknown';
      const ts = new Date(value).getTime();
      if (!Number.isFinite(ts)) return value;
      const mins = Math.max(0, Math.floor((Date.now() - ts) / 60000));
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      return hours < 48 ? `${hours}h ago` : `${Math.floor(hours / 24)}d ago`;
    };
    function setStatus(html) {
      statusEl.innerHTML = html;
      statusEl.dataset.mode = 'custom';
      statusEl.removeAttribute('data-i18n');
    }
    function detectLang() {
      const qp = new URL(location.href).searchParams.get('lang');
      const saved = localStorage.getItem('siteLang') || localStorage.getItem('lang');
      return I18N[qp] ? qp : I18N[saved] ? saved : 'ko';
    }
    function applyLang(lang) {
      currentLang = I18N[lang] ? lang : 'ko';
      document.documentElement.lang = currentLang;
      document.querySelectorAll('[data-i18n]').forEach(node => node.textContent = tr(node.dataset.i18n));
      document.querySelectorAll('[data-placeholder]').forEach(node => node.placeholder = tr(node.dataset.placeholder));
      $('langSelect').value = currentLang;
      localStorage.setItem('siteLang', currentLang);
      localStorage.setItem('lang', currentLang);
      const url = new URL(location.href);
      url.searchParams.set('lang', currentLang);
      history.replaceState(null, '', url);
    }
    async function fetchJson(url, options = {}) {
      const timeoutMs = options.timeoutMs || 12000;
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      const cleanOptions = { ...options };
      delete cleanOptions.timeoutMs;
      const res = await fetch(url, { ...cleanOptions, signal: controller.signal }).finally(() => clearTimeout(timer));
      const text = await res.text();
      if (!res.ok) {
        let message = text || `HTTP ${res.status}`;
        try { message = JSON.parse(text).error || message; } catch {}
        throw new Error(message);
      }
      return text ? JSON.parse(text) : null;
    }
    async function api(path, options = {}) {
      const attempts = options.method === 'POST' ? 1 : 2;
      let lastError;
      for (let i = 0; i < attempts; i += 1) {
        try {
          return await fetchJson(`${PROXY_BASE}${path}`, {
            timeoutMs: options.timeoutMs || (i ? 18000 : 12000),
            ...options,
            headers: { Accept:'application/json,text/plain,*/*', ...(options.headers || {}) }
          });
        } catch (error) {
          lastError = error;
          if (i + 1 < attempts) await new Promise(resolve => setTimeout(resolve, 450));
        }
      }
      throw lastError;
    }
    function setBusy(isBusy) {
      document.querySelectorAll('button').forEach(btn => { if (btn.id !== 'closeModal') btn.disabled = isBusy; });
    }
    function avatar(player, cls = 'avatar') {
      const src = imgUrl(player.avatar_url);
      if (src) return `<img class="${cls}" src="${escapeHtml(src)}" alt="">`;
      return `<div class="${cls}">${escapeHtml((player.username || player.id || '?').slice(0, 1).toUpperCase())}</div>`;
    }
    function playerCard(player) {
      const power = player.power ? `<span class="chip gold">Power ${fmt(player.power)}</span>` : '';
      const town = player.town_hall_level ? `<span class="chip">TC ${player.town_hall_level}</span>` : '';
      const alliance = player.alliance_abbr || player.alliance_name ? `<span class="chip pink">${escapeHtml(player.alliance_abbr || player.alliance_name)}</span>` : '';
      return `<article class="card" data-player-id="${escapeHtml(player.id)}">
        <div class="person">${avatar(player)}<div><div class="name">${escapeHtml(player.username || player.id)}</div><div class="sub">ID ${escapeHtml(player.id || '-')} · K${escapeHtml(player.state || '-')}</div></div></div>
        <div class="chips">${town}${power}${alliance}<span class="chip">Updated ${ago(player.last_refreshed_at)}</span></div>
      </article>`;
    }
    function profileTile(player) {
      const src = imgUrl(player.avatar_url);
      const bg = src ? `<img src="${escapeHtml(src)}" alt="" loading="lazy">` : '';
      const tg = player.town_hall_level ? `<span class="mini tg">TC${escapeHtml(player.town_hall_level)}</span>` : '';
      const alliance = player.alliance_abbr ? `<span class="mini">${escapeHtml(player.alliance_abbr)}</span>` : '';
      return `<button class="profile-tile" type="button" data-player-id="${escapeHtml(player.id)}">
        ${bg}<span class="profile-info"><span class="profile-name">${escapeHtml(player.username || player.id)}</span>
        <span class="profile-meta"><span class="mini">#${escapeHtml(player.state || '-')}</span>${tg}${alliance}</span></span>
      </button>`;
    }
    function bindPlayerClicks(root) {
      root.querySelectorAll('[data-player-id]').forEach(card => card.addEventListener('click', () => openPlayer(card.dataset.playerId)));
    }
    function renderPlayers(players, title = tr('resultsTitle')) {
      $('resultTitle').textContent = title;
      if (!players || !players.length) {
        resultsEl.innerHTML = `<div class="empty">${tr('noResults')}</div>`;
        return;
      }
      resultsEl.innerHTML = players.map(playerCard).join('');
      bindPlayerClicks(resultsEl);
    }
    async function loadIntelStatus() {
      try {
        const data = await fetchJson('/api/intel/status');
        $('statPlayers').textContent = fmt(data.supabasePlayers || data.players || 0);
        $('statCache').textContent = fmt(data.supabaseCachedResponses || data.cachedResponses || 0);
        $('statSource').textContent = data.supabase ? 'SUPA' : data.d1 ? 'D1' : 'LIVE';
      } catch {
        $('statPlayers').textContent = '-';
        $('statCache').textContent = '-';
        $('statSource').textContent = 'LIVE';
      }
    }
    async function loadSpotlight() {
      document.body.classList.remove('results-mode');
      spotlightEl.innerHTML = `<div class="empty">${tr('loadingTiles')}</div>`;
      const offset = Math.floor(Math.random() * 8) * 100;
      try {
        const data = await api(`/players?tagged=1&limit=48&offset=${offset}`);
        const players = data.players || data || [];
        spotlightEl.innerHTML = players.length ? players.map(profileTile).join('') : `<div class="empty">${tr('noResults')}</div>`;
        bindPlayerClicks(spotlightEl);
      } catch (error) {
        spotlightEl.innerHTML = `<div class="empty">${tr('searchFail')}: ${escapeHtml(error.message)}</div>`;
      }
    }
    async function searchPlayers() {
      const q = $('playerQuery').value.trim();
      if (!q) return setStatus(`<span class="bad">${tr('enterSearch')}</span>`);
      if (/^\d{3,}$/.test(q)) return openPlayer(q);
      setBusy(true);
      document.body.classList.add('results-mode');
      setStatus(`Searching <strong>${escapeHtml(q)}</strong>...`);
      try {
        const data = await api(`/players/search?q=${encodeURIComponent(q)}&limit=80`);
        renderPlayers(data.players || [], `${tr('resultsTitle')}: ${q}`);
        setStatus(`<strong>${fmt(data.total || (data.players || []).length)}</strong> players found${data._cache ? ' · local cache' : ''}`);
        await loadIntelStatus();
      } catch (error) {
        setStatus(`<span class="bad">${tr('searchFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        setBusy(false);
      }
    }
    async function loadKingdom() {
      const kid = $('kingdomInput').value.trim();
      if (!/^\d+$/.test(kid)) return setStatus(`<span class="bad">${tr('enterKingdom')}</span>`);
      setBusy(true);
      document.body.classList.add('results-mode');
      setStatus(`Loading kingdom <strong>${escapeHtml(kid)}</strong>...`);
      try {
        const data = await api(`/kingdoms/${kid}`);
        renderKingdom(data);
        renderPlayers(data.top_players || [], `K${kid} Top Players`);
        setStatus(`K<strong>${escapeHtml(kid)}</strong> · tracked players ${fmt(data.tracked_players || 0)} · alliances ${(data.alliances || []).length}`);
        await loadIntelStatus();
      } catch (error) {
        setStatus(`<span class="bad">${tr('kingdomFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        setBusy(false);
      }
    }
    function renderKingdom(data) {
      const grade = data.grades && data.grades.overall;
      const kvk = data.kvk || {};
      const stats = data.stats || [];
      const alliances = data.alliances || [];
      $('sideTitle').textContent = `K${data.kid} ${tr('kingdomInfo')}`;
      $('kingdomSummary').className = '';
      $('kingdomSummary').innerHTML = `<div class="metric">
        <div class="metric-item"><span>Grade</span><strong>${grade ? `${escapeHtml(grade.letter)} #${fmt(grade.rank)}` : '-'}</strong></div>
        <div class="metric-item"><span>Tracked</span><strong>${fmt(data.tracked_players || 0)}</strong></div>
        <div class="metric-item"><span>Castle</span><strong>${escapeHtml(kvk.castle_name || '-')}</strong></div>
        <div class="metric-item"><span>Alliances</span><strong>${fmt(alliances.length)}</strong></div>
      </div>
      <div class="chips">${stats.slice(0, 6).map(item => `<span class="chip">${escapeHtml(item.label)} #${fmt(item.rank)} · ${fmt(item.total)}</span>`).join('')}</div>
      ${alliances.slice(0, 18).map(a => `<div class="alliance"><div><strong>${escapeHtml(a.abbr || '-')} ${escapeHtml(a.name || '')}</strong><div class="sub">members ${fmt(a.tracked_members || a.member_count || 0)} · rank ${escapeHtml(a.power_rank || '-')}</div></div><strong>${fmt(a.power || 0)}</strong></div>`).join('')}`;
    }
    async function openPlayer(id) {
      if (!id) return;
      currentPlayerId = String(id);
      setBusy(true);
      setStatus(`Loading player <strong>${escapeHtml(id)}</strong>...`);
      modal.showModal();
      $('modalTitle').innerHTML = `<div class="sub">${tr('loadingDetail')}</div>`;
      $('modalBody').innerHTML = `<div class="empty">${tr('loadingDetail')}</div>`;
      try {
        const [player, history, redemptions, kingdata, standings, loadout] = await Promise.all([
          api(`/players/${encodeURIComponent(id)}`),
          api(`/players/${encodeURIComponent(id)}/history`).catch(() => []),
          api(`/players/${encodeURIComponent(id)}/redemptions`).catch(() => ({ redemptions: [] })),
          api(`/players/${encodeURIComponent(id)}/kingdata`).catch(() => null),
          api(`/players/${encodeURIComponent(id)}/standings`).catch(() => ({ standings: [] })),
          api(`/players/${encodeURIComponent(id)}/loadout?cached=1`).catch(() => null),
        ]);
        renderPlayerModal(player, history || [], redemptions || {}, kingdata, standings || {}, loadout);
        setStatus(`Loaded <strong>${escapeHtml(player.username || player.id)}</strong>${player._cache ? ' · local cache' : ''}`);
        await loadIntelStatus();
      } catch (error) {
        $('modalTitle').innerHTML = '<div class="sub">Load failed</div>';
        $('modalBody').innerHTML = `<div class="empty">${tr('detailFail')}: ${escapeHtml(error.message)}</div>`;
        setStatus(`<span class="bad">${tr('detailFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        setBusy(false);
      }
    }
    async function refreshCurrentPlayer() {
      if (!currentPlayerId) return;
      $('refreshPlayerBtn').disabled = true;
      try {
        await api('/players', { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ id: currentPlayerId }) });
        await openPlayer(currentPlayerId);
      } catch (error) {
        setStatus(`<span class="bad">${tr('detailFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        $('refreshPlayerBtn').disabled = false;
      }
    }
    const gearTiers = [
      { lvl:0, label:'Green', bg:'linear-gradient(145deg,#223b30,#101a16)', accent:'#5dffbd' },
      { lvl:3, label:'Blue', bg:'linear-gradient(145deg,#1d3d66,#101824)', accent:'#70b7ff' },
      { lvl:7, label:'Epic', bg:'linear-gradient(145deg,#45246b,#191224)', accent:'#b28cff' },
      { lvl:15, label:'Legend', bg:'linear-gradient(145deg,#684719,#21160a)', accent:'#ffd76a' },
      { lvl:31, label:'Red', bg:'linear-gradient(145deg,#6d2029,#240c11)', accent:'#ff7685' },
      { lvl:43, label:'Mythic', bg:'linear-gradient(145deg,#7c2436,#271018)', accent:'#ff9aae' }
    ];
    function gearEnhance(value) {
      const raw = Number(value) || 0;
      return raw > 100 ? { level: raw - 100, ascended: true } : { level: raw, ascended: false };
    }
    function gearVisual(item) {
      const enhance = gearEnhance(item && item.slv);
      let tier = gearTiers[0];
      for (const candidate of gearTiers) if (enhance.level >= candidate.lvl) tier = candidate;
      return enhance.ascended ? { ...tier, label:'Ascended', bg:'linear-gradient(145deg,#7c2d12,#2a1006)', accent:'#fb923c', enhance } : { ...tier, enhance };
    }
    function gearArt(item) {
      const value = Number(item && item.eid) || 0;
      if (value) return weaponArt(value);
      const fallback = Number(item && (item.gid || item.id || item.equipid)) || 0;
      return fallback > 1000 ? assetUrl(`/assets/gear/${fallback}.png`) : '';
    }
    function equipmentName(slot) {
      return ({1:'Weapon',2:'Armor',3:'Helmet',4:'Boots'})[slot] || `Slot ${slot || '-'}`;
    }
    function starText(star) {
      const value = Number(star) || 0;
      if (!value) return '-';
      const rarity = Math.max(0, Math.floor((value - 1) / 5));
      const stars = ((value - 1) % 5) + 1;
      return `R${rarity} · ${stars} stars`;
    }
    function renderLoadout(loadout) {
      const heroes = loadout && Array.isArray(loadout.heroes) ? loadout.heroes : [];
      if (!heroes.length) return `<h2>Heroes & Gear</h2><div class="empty">${tr('noLoadout')}</div>`;
      const tags = `${loadout.fetched_at ? `<span class="chip">Fetched ${ago(loadout.fetched_at)}</span>` : ''}${loadout.stale ? `<span class="chip pink">Cached data may be stale</span>` : ''}`;
      const cards = heroes.slice().sort((a,b) => (a.slot || 0) - (b.slot || 0)).map(hero => {
        const weaponLevel = hero.exclusive_equip_lv ?? hero.exclusive_lv ?? hero.exclusive_level ?? hero.widget_lv ?? '-';
        const weapon = hero.exclusive_equip ? `<div class="weapon-line"><img src="${weaponArt(hero.exclusive_equip)}" alt="" onerror="this.style.visibility='hidden'"><span>Exclusive Lv ${escapeHtml(weaponLevel)}</span></div>` : '';
        const gear = (hero.equipment || []).slice().sort((a,b) => (a.sid || 0) - (b.sid || 0)).map(item => {
          const visual = gearVisual(item);
          const art = gearArt(item);
          const icon = art ? `<img src="${art}" alt="" onerror="this.style.visibility='hidden'">` : '<span></span>';
          return `<div class="gear-chip" style="--gear-bg:${visual.bg};--gear-accent:${visual.accent}"><span class="gear-enh">+${escapeHtml(visual.enhance.level)}</span>${icon}<div><strong>${equipmentName(item.sid)}</strong><span>Forge Lv ${escapeHtml(item.rlv ?? 0)}</span><em class="gear-rarity">${visual.label}</em></div></div>`;
        }).join('');
        return `<article class="hero-card"><div class="hero-art"><img src="${heroBust(hero.id)}" alt="" onerror="this.style.visibility='hidden'"><span class="hero-id">Hero ${escapeHtml(hero.id)}</span></div><div class="hero-body"><div class="line"><span>Slot</span><strong>${escapeHtml(hero.slot || hero.pos || '-')}</strong></div><div class="line"><span>Level</span><strong>${escapeHtml(hero.lv ?? '-')}</strong></div><div class="line"><span>Stars</span><strong>${escapeHtml(starText(hero.star))}</strong></div>${weapon}<div class="gear-list">${gear || '<div class="empty">No gear</div>'}</div></div></article>`;
      }).join('');
      return `<h2>Heroes & Gear</h2><div class="chips">${tags}</div><div class="loadout-grid">${cards}</div>`;
    }
    function renderPlayerModal(player, history, redemptions, kingdata, standings, loadout) {
      $('modalTitle').innerHTML = `${avatar(player)}<div><div class="name">${escapeHtml(player.username || player.id)}</div><div class="sub">ID ${escapeHtml(player.id)} · K${escapeHtml(player.state || '-')} · ${escapeHtml(player.alliance_abbr || player.alliance_name || '-')}</div></div>`;
      const portrait = imgUrl(player.avatar_url);
      const boxes = [
        ['Power', fmt(player.power)], ['Town Center', player.town_hall_level || '-'], ['Life Tree', player.life_tree_level || '-'], ['Mystic Score', fmt(player.mystic_trial_score)],
        ['Mystic Rank', player.mystic_trial_rank ? `#${fmt(player.mystic_trial_rank)}` : '-'], ['Updated', ago(player.last_refreshed_at)], ['Crowns', kingdata && kingdata.crowns != null ? kingdata.crowns : '-'], ['Kingdoms ruled', kingdata && kingdata.kingdoms_ruled != null ? kingdata.kingdoms_ruled : '-'],
      ];
      const standingRows = (standings.standings || []).slice(0, 12).map(row => `<tr><td>${escapeHtml(row.label || row.board_type)}</td><td>#${fmt(row.rank)}</td><td>${fmt(row.score)}</td><td>${row.kid ? `K${escapeHtml(row.kid)}` : '-'}</td></tr>`).join('');
      const historyRows = history.slice(0, 10).map(row => `<tr><td>${escapeHtml(row.username || '-')}</td><td>K${escapeHtml(row.state || '-')}</td><td>${escapeHtml(row.alliance_abbr || row.alliance_name || '-')}</td><td>${fmt(row.power || '')}</td><td>${ago(row.recorded_at)}</td></tr>`).join('');
      const codeRows = (redemptions.redemptions || []).slice(0, 10).map(row => `<tr><td>${escapeHtml(row.Code || row.code || '-')}</td><td>${escapeHtml(row.Status || row.status || '-')}</td><td>${ago(row.RedeemedAt || row.redeemed_at)}</td></tr>`).join('');
      $('modalBody').innerHTML = `<section class="profile-hero"><div class="portrait">${portrait ? `<img src="${escapeHtml(portrait)}" alt="">` : ''}</div><div class="detail-grid">${boxes.map(([label, value]) => `<div class="detail-box"><span>${label}</span><strong>${escapeHtml(value)}</strong></div>`).join('')}</div></section>
        ${renderLoadout(loadout)}
        <h2>Standings</h2>${standingRows ? `<table><thead><tr><th>Board</th><th>Rank</th><th>Score</th><th>Kingdom</th></tr></thead><tbody>${standingRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}
        <h2>History</h2>${historyRows ? `<table><thead><tr><th>Name</th><th>Kingdom</th><th>Alliance</th><th>Power</th><th>Recorded</th></tr></thead><tbody>${historyRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}
        <h2>Codes</h2>${codeRows ? `<table><thead><tr><th>Code</th><th>Status</th><th>Time</th></tr></thead><tbody>${codeRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}`;
    }

    function renderPlayerModal(player, history, redemptions, kingdata, standings, loadout) {
      const kingdom = player.state || player.kid || player.kingdom || '-';
      const alliance = player.alliance_abbr || player.alliance_name || '-';
      $('modalTitle').innerHTML = `${avatar(player)}<div><div class="name">${escapeHtml(player.username || player.id)}</div><div class="sub">ID ${escapeHtml(player.id)} / K${escapeHtml(kingdom)} / ${escapeHtml(alliance)}</div></div>`;
      const portrait = imgUrl(player.avatar_url);
      const boxes = [
        ['Power', fmt(player.power)],
        ['Town Center', player.town_hall_level || '-'],
        ['Life Tree', player.life_tree_level || '-'],
        ['Mystic Score', fmt(player.mystic_trial_score)],
        ['Mystic Rank', player.mystic_trial_rank ? `#${fmt(player.mystic_trial_rank)}` : '-'],
        ['Crowns', kingdata && kingdata.crowns != null ? kingdata.crowns : '-'],
        ['Kingdoms ruled', kingdata && kingdata.kingdoms_ruled != null ? kingdata.kingdoms_ruled : '-'],
        ['Updated', ago(player.last_refreshed_at)],
      ];
      const standingRows = (standings.standings || []).slice(0, 12).map(row => `<tr><td>${escapeHtml(row.label || row.board_type)}</td><td>#${fmt(row.rank)}</td><td>${fmt(row.score)}</td><td>${row.kid ? `K${escapeHtml(row.kid)}` : '-'}</td></tr>`).join('');
      const historyRows = history.slice(0, 10).map(row => `<tr><td>${escapeHtml(row.username || '-')}</td><td>K${escapeHtml(row.state || '-')}</td><td>${escapeHtml(row.alliance_abbr || row.alliance_name || '-')}</td><td>${fmt(row.power || '')}</td><td>${ago(row.recorded_at)}</td></tr>`).join('');
      const codeRows = (redemptions.redemptions || []).slice(0, 10).map(row => `<tr><td>${escapeHtml(row.Code || row.code || '-')}</td><td>${escapeHtml(row.Status || row.status || '-')}</td><td>${ago(row.RedeemedAt || row.redeemed_at)}</td></tr>`).join('');
      $('modalBody').className = 'modal-body premium';
      $('modalBody').innerHTML = `<section class="premium-profile">
          <div class="premium-portrait">${portrait ? `<img src="${escapeHtml(portrait)}" alt="">` : ''}</div>
          <div class="premium-summary">
            <div class="premium-title">
              <div class="brand">885 LEGEND NASHSH INTEL</div>
              <h2>${escapeHtml(player.username || player.id)}</h2>
              <div class="premium-id">ID ${escapeHtml(player.id)} / K${escapeHtml(kingdom)} / ${escapeHtml(alliance)}</div>
              <div class="premium-badges">
                <span class="premium-badge hot">Power ${fmt(player.power)}</span>
                <span class="premium-badge">TC ${escapeHtml(player.town_hall_level || '-')}</span>
                <span class="premium-badge">Mystic #${escapeHtml(player.mystic_trial_rank || '-')}</span>
                <span class="premium-badge">Updated ${ago(player.last_refreshed_at)}</span>
              </div>
            </div>
            <div class="premium-stat-grid">${boxes.map(([label, value]) => `<div class="premium-stat"><span>${label}</span><strong>${escapeHtml(value)}</strong></div>`).join('')}</div>
          </div>
        </section>
        <section class="premium-section">${renderLoadout(loadout)}</section>
        <section class="premium-section"><h2>Standings</h2>${standingRows ? `<table><thead><tr><th>Board</th><th>Rank</th><th>Score</th><th>Kingdom</th></tr></thead><tbody>${standingRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}</section>
        <section class="premium-section"><h2>History</h2>${historyRows ? `<table><thead><tr><th>Name</th><th>Kingdom</th><th>Alliance</th><th>Power</th><th>Recorded</th></tr></thead><tbody>${historyRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}</section>
        <section class="premium-section"><h2>Codes</h2>${codeRows ? `<table><thead><tr><th>Code</th><th>Status</th><th>Time</th></tr></thead><tbody>${codeRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}</section>`;
    }

    async function refreshCurrentPlayer() {
      if (!currentPlayerId) return;
      const btn = $('refreshPlayerBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Refreshing...';
      setStatus(`Refreshing player <strong>${escapeHtml(currentPlayerId)}</strong>...`);
      try {
        await api('/players', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: currentPlayerId })
        }).catch(() => null);
        await openPlayer(currentPlayerId);
      } catch (error) {
        setStatus(`<span class="bad">${tr('detailFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        btn.disabled = false;
        btn.textContent = originalText || tr('refresh');
      }
    }

    async function openPlayer(id) {
      if (!id) return;
      currentPlayerId = String(id);
      setBusy(true);
      setStatus(`Loading player <strong>${escapeHtml(id)}</strong>...`);
      modal.showModal();
      $('modalTitle').innerHTML = `<div class="sub">${tr('loadingDetail')}</div>`;
      $('modalBody').className = 'modal-body premium';
      $('modalBody').innerHTML = `<section class="premium-section"><div class="empty">${tr('loadingDetail')}</div></section>`;
      try {
        const player = await api(`/players/${encodeURIComponent(id)}`, { timeoutMs: 16000 });
        const detailResults = await Promise.allSettled([
          api(`/players/${encodeURIComponent(id)}/history`, { timeoutMs: 9000 }),
          api(`/players/${encodeURIComponent(id)}/redemptions`, { timeoutMs: 9000 }),
          api(`/players/${encodeURIComponent(id)}/kingdata`, { timeoutMs: 9000 }),
          api(`/players/${encodeURIComponent(id)}/standings`, { timeoutMs: 9000 }),
          api(`/players/${encodeURIComponent(id)}/loadout?cached=1`, { timeoutMs: 14000 }),
        ]);
        const [history, redemptions, kingdata, standings, loadout] = detailResults.map((result, index) => {
          if (result.status === 'fulfilled') return result.value;
          return [[], { redemptions: [] }, null, { standings: [] }, null][index];
        });
        const partial = detailResults.some(result => result.status === 'rejected');
        renderPlayerModal(player, history || [], redemptions || {}, kingdata, standings || {}, loadout, { partial });
        setStatus(`Loaded <strong>${escapeHtml(player.username || player.id)}</strong>${player._cache ? ' · local cache' : ''}${partial ? ' · partial detail' : ''}`);
        await loadIntelStatus();
      } catch (error) {
        $('modalTitle').innerHTML = '<div class="sub">Load failed</div>';
        $('modalBody').className = 'modal-body premium';
        $('modalBody').innerHTML = `<section class="premium-section"><div class="empty">${tr('detailFail')}: ${escapeHtml(error.message)}<br><br><button type="button" onclick="openPlayer('${escapeHtml(String(id))}')">Retry</button></div></section>`;
        setStatus(`<span class="bad">${tr('detailFail')}: ${escapeHtml(error.message)}</span>`);
      } finally {
        setBusy(false);
      }
    }

    function renderPlayerModal(player, history, redemptions, kingdata, standings, loadout, options = {}) {
      const kingdom = player.state || player.kid || player.kingdom || '-';
      const alliance = player.alliance_abbr || player.alliance_name || '-';
      const portrait = imgUrl(player.avatar_url);
      const initial = escapeHtml((player.username || player.id || '?').slice(0, 1).toUpperCase());
      const boxes = [
        ['Power', fmt(player.power)],
        ['Town Center', player.town_hall_level || '-'],
        ['Life Tree', player.life_tree_level || '-'],
        ['Mystic Score', fmt(player.mystic_trial_score)],
        ['Mystic Rank', player.mystic_trial_rank ? `#${fmt(player.mystic_trial_rank)}` : '-'],
        ['Crowns', kingdata && kingdata.crowns != null ? kingdata.crowns : '-'],
        ['Kingdoms ruled', kingdata && kingdata.kingdoms_ruled != null ? kingdata.kingdoms_ruled : '-'],
        ['Updated', ago(player.last_refreshed_at)],
      ];
      const standingRows = (standings.standings || []).slice(0, 12).map(row => `<tr><td>${escapeHtml(row.label || row.board_type)}</td><td>#${fmt(row.rank)}</td><td>${fmt(row.score)}</td><td>${row.kid ? `K${escapeHtml(row.kid)}` : '-'}</td></tr>`).join('');
      const historyRows = history.slice(0, 10).map(row => `<tr><td>${escapeHtml(row.username || '-')}</td><td>K${escapeHtml(row.state || '-')}</td><td>${escapeHtml(row.alliance_abbr || row.alliance_name || '-')}</td><td>${fmt(row.power || '')}</td><td>${ago(row.recorded_at)}</td></tr>`).join('');
      const codeRows = (redemptions.redemptions || []).slice(0, 10).map(row => `<tr><td>${escapeHtml(row.Code || row.code || '-')}</td><td>${escapeHtml(row.Status || row.status || '-')}</td><td>${ago(row.RedeemedAt || row.redeemed_at)}</td></tr>`).join('');
      $('modalTitle').innerHTML = `${avatar(player)}<div><div class="name">${escapeHtml(player.username || player.id)}</div><div class="sub">ID ${escapeHtml(player.id)} · K${escapeHtml(kingdom)} · ${escapeHtml(alliance)}</div></div>`;
      $('modalBody').className = 'modal-body premium';
      $('modalBody').innerHTML = `<section class="intel-passport">
          <div class="intel-image-card">
            ${portrait ? `<img src="${escapeHtml(portrait)}" alt="">` : `<div class="profile-initial">${initial}</div>`}
            <div class="intel-card-label"><span>K${escapeHtml(kingdom)}</span><span>${escapeHtml(alliance)}</span></div>
          </div>
          <div class="intel-profile-card">
            <div class="intel-head-card">
              <div class="brand">885 LEGEND NASHSH INTEL</div>
              <h2>${escapeHtml(player.username || player.id)}</h2>
              <div class="intel-meta-line">ID ${escapeHtml(player.id)} · Kingdom ${escapeHtml(kingdom)} · ${escapeHtml(alliance)}</div>
              <div class="intel-badges">
                <span class="intel-badge gold">Power ${fmt(player.power)}</span>
                <span class="intel-badge">TC ${escapeHtml(player.town_hall_level || '-')}</span>
                <span class="intel-badge">Mystic ${player.mystic_trial_rank ? `#${fmt(player.mystic_trial_rank)}` : '-'}</span>
                <span class="intel-badge">Updated ${ago(player.last_refreshed_at)}</span>
              </div>
            </div>
            ${options.partial ? `<div class="partial-alert">Some detail panels could not load from the source. Basic profile data is still shown from the available response/cache.</div>` : ''}
            <div class="intel-stats">${boxes.map(([label, value]) => `<div class="intel-stat"><span>${label}</span><strong>${escapeHtml(value)}</strong></div>`).join('')}</div>
          </div>
        </section>
        <section class="premium-section">${renderLoadout(loadout)}</section>
        <section class="premium-section"><h2>Standings</h2>${standingRows ? `<table><thead><tr><th>Board</th><th>Rank</th><th>Score</th><th>Kingdom</th></tr></thead><tbody>${standingRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}</section>
        <section class="premium-section"><h2>History</h2>${historyRows ? `<table><thead><tr><th>Name</th><th>Kingdom</th><th>Alliance</th><th>Power</th><th>Recorded</th></tr></thead><tbody>${historyRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}</section>
        <section class="premium-section"><h2>Codes</h2>${codeRows ? `<table><thead><tr><th>Code</th><th>Status</th><th>Time</th></tr></thead><tbody>${codeRows}</tbody></table>` : `<div class="empty">${tr('noResults')}</div>`}</section>`;
    }

    $('searchBtn').addEventListener('click', searchPlayers);
    $('directBtn').addEventListener('click', () => openPlayer($('playerQuery').value.trim()));
    $('kingdomBtn').addEventListener('click', loadKingdom);
    $('shuffleBtn').addEventListener('click', loadSpotlight);
    $('refreshPlayerBtn').addEventListener('click', refreshCurrentPlayer);
    $('closeModal').addEventListener('click', () => modal.close());
    $('playerQuery').addEventListener('keydown', event => { if (event.key === 'Enter') searchPlayers(); });
    $('kingdomInput').addEventListener('keydown', event => { if (event.key === 'Enter') loadKingdom(); });
    $('langSelect').addEventListener('change', event => applyLang(event.target.value));
    applyLang(detectLang());
    loadIntelStatus();
    loadSpotlight();
  </script>
</body>
</html>
