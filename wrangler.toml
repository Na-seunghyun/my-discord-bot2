# Optional Supabase Intel storage.
# Add SUPABASE_URL as a plain environment variable in Cloudflare.
# Add SUPABASE_SERVICE_ROLE_KEY as a secret, never in this file.
#
# Example:
# SUPABASE_URL = "https://YOUR_PROJECT_REF.supabase.co"
